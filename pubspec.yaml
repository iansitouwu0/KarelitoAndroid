name: karelito
description: "Karelito."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  dynamic_color: ^1.8.1
  go_router: ^17.0.1
  material_color_utilities: any
  flutter_bluetooth_classic_serial: ^1.3.1
  provider: ^6.1.5+1
  shared_preferences: ^2.3.2

  # Paquetes Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0

  
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  uuid: ^4.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/home/
    - assets/configuracion/
    - assets/levelView/
    - assets/imagenesNiveles/

  uses-material-design: true
